<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="coinShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Outer coin -->
  <circle cx="32" cy="32" r="28" fill="url(#coin)" stroke="#b45309" stroke-width="2"/>
  <!-- Inner circle (creates coin edge) -->
  <circle cx="32" cy="32" r="24" fill="url(#coin)"/>
  <!-- Dollar sign -->
  <text x="32" y="40" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">$</text>
  <!-- Shine -->
  <ellipse cx="24" cy="24" rx="8" ry="6" fill="url(#coinShine)"/>
</svg>
